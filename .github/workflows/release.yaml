name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:
    name: Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ioctl-linux-amd64
            server_artifact_name: iotex-core-linux-amd64
          - os: windows-latest
            artifact_name: ioctl-windows-amd64.exe
            server_artifact_name: iotex-core-windows-amd64.exe
          - os: macos-latest
            artifact_name: ioctl-darwin-amd64
            server_artifact_name: iotex-core-darwin-amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.24.6

      # Linux artifacts are built inside a Debian bullseye container (glibc 2.31)
      # so the CGO-linked binaries only require GLIBC <= 2.31 and therefore run on
      # Ubuntu 20.04 (focal, glibc 2.31) and every newer distro. Building on the
      # ubuntu-latest runner directly links against its glibc (2.35+/2.39), which
      # produces binaries that fail on Ubuntu 20.04 with "GLIBC_2.32/2.34 not
      # found" (issue #4066). ioctl and server both pull in CGO dependencies
      # (erigon-lib/mdbx-go, supranational/blst), so CGO cannot simply be
      # disabled; lowering the build-time glibc is the correct fix.
      - name: make iotex-server/ioctl (Linux, glibc 2.31 for Ubuntu 20.04+)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # Create bin/ on the host first so it is owned by the runner user; the
          # container writes the (root-owned) binaries into it, and the later GPG
          # signing steps can still create the *.asc files inside this directory.
          mkdir -p bin
          docker run --rm \
            --platform linux/amd64 \
            -v "${{ github.workspace }}":/src -w /src \
            -e CGO_CFLAGS=-D_LARGEFILE64_SOURCE \
            -e PACKAGE_VERSION=${{ github.ref_name }} \
            -e PACKAGE_COMMIT_ID=${{ github.sha }} \
            -e GIT_STATUS=clean \
            golang:1.24.6-bullseye \
            bash -c "git config --global --add safe.directory /src && make build"

      - name: make iotex-server/ioctl (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          make build

      - name: make iotex-server/ioctl windows
        if: startsWith(matrix.os, 'windows-latest')
        run: |
          make ioctl

      - name: Upload iotex-core binaries to release
        if: startsWith(matrix.os, 'windows-latest') != true
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./bin/server
          asset_name: ${{ matrix.server_artifact_name }}
          tag: ${{ github.ref }}

      - name: Configure iotex-core GPG Linux/MacOS
        if: startsWith(matrix.os, 'windows-latest') != true
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          export GPG_TTY=$(tty)
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          echo "$GPG_PASSPHRASE" | gpg --passphrase-fd 0 --pinentry-mode loopback --batch -ab ./bin/server

      - name: Upload iotex-core signature
        if: startsWith(matrix.os, 'windows-latest') != true
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: ${{ matrix.server_artifact_name }}.asc
          file: ./bin/server.asc
          tag: ${{ github.ref }}

      - name: Upload ioctl binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./bin/ioctl
          asset_name: ${{ matrix.artifact_name }}
          tag: ${{ github.ref }}

      - name: Configure ioctl GPG Linux/MacOS
        if: startsWith(matrix.os, 'windows-latest') != true
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          export GPG_TTY=$(tty)
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          echo "$GPG_PASSPHRASE" | gpg --passphrase-fd 0 --pinentry-mode loopback --batch -ab ./bin/ioctl

      - name: Configure ioctl GPG Windows
        if: startsWith(matrix.os, 'windows-latest')
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo $env:GPG_SIGNING_KEY | gpg --batch --import
          gpg --passphrase "$env:GPG_PASSPHRASE" --batch --pinentry-mode loopback -ab ./bin/ioctl

      - name: Upload ioctl signature
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          asset_name: ${{ matrix.artifact_name }}.asc
          file: ./bin/ioctl.asc
          tag: ${{ github.ref }}
